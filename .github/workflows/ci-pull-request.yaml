name: ci-pull-request
env:
  SONARCLOUD_TASK_URL: https://sonarcloud.io/api/ce/task
  SONARCLOUD_PROJECT_STATUS_URL: https://sonarcloud.io/api/qualitygates/project_status
  RENDER_API_URL: https://api.render.com/v1
  UV_PYTHON: "3.12"
on:
  pull_request:
    branches:
      - master
    types: [opened, edited, synchronize, reopened]
jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.compute.outputs.version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: compute next version from PR title
        id: compute
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          version=$(.github/scripts/compute-next-version.sh "$PR_TITLE")
          echo "version=${version}" | tee -a "$GITHUB_OUTPUT"
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: running tests
        run: |
          uv run --python ${{ matrix.python-version }} --group test pytest tests --cov=isotope_pattern_service --cov-report=xml:./artifacts/test-report/coverage-report.xml
      - name: saving artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./artifacts
  # Fan-in gate: matrix jobs report as "test-matrix (3.9)" etc, not a single
  # "tests" check, which breaks branch protection rules pinned to that name.
  # This job restores a single, stably-named required check.
  tests:
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - name: all python version matrix legs passed
        run: echo "All test-matrix legs passed"
  code-analysis:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: loading artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarCloud scan
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          SONAR_TOKEN: ${{secrets.SONARCLOUD_TOKEN}}
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-8.1.0.6389-linux-x64.zip
          unzip ./sonar-scanner-cli-8.1.0.6389-linux-x64.zip
          rm ./sonar-scanner-cli-8.1.0.6389-linux-x64.zip
          mv ./sonar-scanner-8.1.0.6389-linux-x64 /opt
          mv /opt/sonar-scanner-8.1.0.6389-linux-x64 /opt/sonar-scanner
          /opt/sonar-scanner/bin/sonar-scanner \
            -Dsonar.organization=${{secrets.SONARCLOUD_ORGANIZATION}} \
            -Dsonar.projectKey=${{secrets.SONARCLOUD_PROJECT_KEY}} \
            -Dsonar.sources=isotope_pattern_service \
            -Dsonar.tests=tests \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.python.coverage.reportPaths=test-report/coverage-report.xml \
            -Dsonar.exclusions=test-report/** \
            -Dsonar.pullrequest.key=${{github.event.pull_request.number}}
      - name: SonarCloud quality gate evaluation
        env:
          SONAR_TOKEN: ${{secrets.SONARCLOUD_TOKEN}}
        run: |
          taskId=$(awk -v FS="ceTaskId=" 'NF>1{print $2}' .scannerwork/report-task.txt)
          echo "taskId=${taskId}"

          status="PENDING"
          for i in $(seq 1 30); do
            taskResponse=$(curl -s -u "${SONAR_TOKEN}:" --location --request GET "${{env.SONARCLOUD_TASK_URL}}?id=${taskId}")
            status=$(echo "$taskResponse" | jq -r '.task.status')
            echo "CE task status: ${status}"
            if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILED" ] || [ "$status" = "CANCELED" ]; then
              break
            fi
            sleep 5
          done

          if [ "$status" != "SUCCESS" ]; then
            echo "SonarCloud analysis task did not complete successfully (status: ${status})"
            echo "Full task response: ${taskResponse}"
            exit 1
          fi

          analysisId=$(echo "$taskResponse" | jq -r '.task.analysisId')
          echo "analysisId=${analysisId}"
          qualityGateResponse=$(curl -s -u "${SONAR_TOKEN}:" --location --request GET "${{env.SONARCLOUD_PROJECT_STATUS_URL}}?analysisId=${analysisId}")
          qualityGateStatus=$(echo "$qualityGateResponse" | jq -r '.projectStatus.status // empty')
          echo "Quality gate status: ${qualityGateStatus:-<none>}"

          if [ -z "$qualityGateStatus" ]; then
            echo "Could not read quality gate status, full response: ${qualityGateResponse}"
            exit 1
          fi

          if [ "$qualityGateStatus" = "ERROR" ]; then
            echo "The quality gate was not passed"
            exit 1
          fi
  e2e-deploy:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: point test service at this PR's branch
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_TEST_SERVICE_ID: ${{ secrets.RENDER_TEST_SERVICE_ID }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          curl -sf -X PATCH "${{ env.RENDER_API_URL }}/services/${RENDER_TEST_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${PR_BRANCH}\"}"
      - name: trigger deploy
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_TEST_SERVICE_ID: ${{ secrets.RENDER_TEST_SERVICE_ID }}
        run: |
          deploy_id=$(curl -sf -X POST "${{ env.RENDER_API_URL }}/services/${RENDER_TEST_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | jq -r '.id')
          echo "deploy_id=${deploy_id}" | tee -a "$GITHUB_OUTPUT"
      - name: wait for deploy to go live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_TEST_SERVICE_ID: ${{ secrets.RENDER_TEST_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          for i in $(seq 1 60); do
            status=$(curl -sf "${{ env.RENDER_API_URL }}/services/${RENDER_TEST_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')
            echo "deploy status: ${status}"
            case "$status" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated)
                echo "deploy failed with status ${status}"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "timed out waiting for deploy to go live"
          exit 1
      - name: e2e check against a real API request
        env:
          RENDER_TEST_SERVICE_URL: ${{ secrets.RENDER_TEST_SERVICE_URL }}
        run: |
          status_code="000"
          for i in $(seq 1 10); do
            status_code=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
              "${RENDER_TEST_SERVICE_URL}/isotope-pattern/api/compute" \
              -H 'Content-Type: application/json' \
              -d '{"formula":"C2H5OH"}') || status_code="000"
            if [ "$status_code" = "200" ]; then
              break
            fi
            echo "got HTTP ${status_code}, retrying in 10s (attempt ${i}/10, service may still be cold-starting)"
            sleep 10
          done

          echo "response body:"
          cat /tmp/response.json

          if [ "$status_code" != "200" ]; then
            echo "test environment did not return 200 after retries"
            exit 1
          fi

          python3 -c "
          import json
          data = json.load(open('/tmp/response.json'))
          assert isinstance(data, list) and len(data) > 0, 'expected a non-empty list of isotope patterns'
          assert all({'name', 'mass', 'probability', 'isotopes'} <= p.keys() for p in data), 'malformed isotope pattern entry'
          print('e2e check passed')
          "
      - name: reset test service branch to master
        if: always()
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_TEST_SERVICE_ID: ${{ secrets.RENDER_TEST_SERVICE_ID }}
        run: |
          curl -sf -X PATCH "${{ env.RENDER_API_URL }}/services/${RENDER_TEST_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "master"}'
